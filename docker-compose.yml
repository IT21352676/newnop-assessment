version: "3.9"

services:
  app:
    image: hirushatorchlabs/flop-nop:latest
    container_name: nestjs_app
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.1
    container_name: mysql_db
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
